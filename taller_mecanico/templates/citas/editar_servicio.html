{% extends "base.html" %}
{% block title %}Editar Servicio — AutoServi Pro{% endblock %}

{% block content %}

<div style="max-width:650px;margin:0 auto">
    
    <div class="mb-3">
        <a href="{% url 'lista_servicios' %}" class="ds-btn ds-btn-ghost ds-btn-sm">
            <i class="fas fa-arrow-left"></i> Volver a Servicios
        </a>
    </div>

    <div class="ds-card p-0">
        <div class="ds-card-header" style="background:#f8fafc;border-bottom:1px solid #f1f5f9;padding:22px">
            <h4 style="margin:0;font-weight:800;color:#1e293b;font-family:'Oswald',sans-serif">
                <i class="fas fa-wrench" style="color:var(--accent);margin-right:10px"></i>
                Editar Servicio
            </h4>
        </div>
        
        <div class="ds-card-body" style="padding:30px">
            <form method="POST">                    
                {% csrf_token %}
                                        
                <div class="ds-form-group">
                    <label class="ds-label" for="nombre">Nombre del Servicio</label>
                    <input type="text" class="ds-input" id="nombre" name="nombre" value="{{ servicio.nombre }}" required>
                </div>
                                        
                <div class="ds-form-group">
                    <label class="ds-label" for="descripcion">Descripción</label>
                    <textarea class="ds-textarea" id="descripcion" name="descripcion" rows="3">{{ servicio.descripcion }}</textarea>
                </div>
                                        
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:18px">                        
                    <div class="ds-form-group" style="margin-bottom:0">
                        <label class="ds-label" for="duracion">Duración (min)</label>                            
                        <input type="number" class="ds-input" id="duracion" name="duracion" min="15" step="15" value="{{ servicio.duracion }}" required>
                        <div class="ds-help">Ej: 30, 60</div>
                    </div>
                                            
                    <div class="ds-form-group" style="margin-bottom:0">
                        <label class="ds-label" for="precio">Precio (Q)</label>                            
                        <input type="number" class="ds-input" id="precio" name="precio" min="0" step="0.01" value="{{ servicio.precio|stringformat:'.2f' }}" required>                        
                    </div>
                </div>
                                        
                <div class="ds-form-group">
                    <label class="ds-label" for="categoria">Categoría</label>
                    <select class="ds-select" id="categoria" name="categoria" required>                            
                        {% for key, value in categorias %}
                            <option value="{{ key }}" {% if servicio.categoria == key %}selected{% endif %}>{{ value }}</option>                            
                        {% endfor %}
                    </select>
                </div>
                
                <hr class="ds-divider" style="margin:30px 0">
                                        
                <div style="display:flex;justify-content:flex-end;gap:12px">
                    <a href="{% url 'lista_servicios' %}" class="ds-btn ds-btn-secondary ds-btn-lg">
                        Cancelar
                    </a>
                    <button type="submit" class="ds-btn ds-btn-primary ds-btn-lg">
                        <i class="fas fa-save"></i> Actualizar
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

{% endblock %}
