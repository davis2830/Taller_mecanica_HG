[pytest]
DJANGO_SETTINGS_MODULE = taller_mecanico.settings
python_files = tests.py test_*.py *_tests.py

# Solo buscamos tests bajo `tests/` (raíz) y los `test_*.py` dentro de apps.
# Excluimos carpetas generadas o de terceros.
testpaths = tests
norecursedirs = .git venv node_modules frontend static media .pytest_cache __pycache__

# Flags por defecto:
#   -ra: reporta razones de todos los tests que no pasaron (fail/skip/xfail).
#   --strict-markers: prohíbe usar markers sin declararlos aquí.
#   --tb=short: traceback compacto (evita ruido en logs CI).
#   -p no:cacheprovider: evita crear .pytest_cache (ruido git).
addopts =
    -ra
    --strict-markers
    --tb=short
    -p no:cacheprovider

markers =
    slow: tests que tardan > 1s (se pueden filtrar con -m "not slow").
    integration: tests de integración que tocan múltiples capas.
    whatsapp: tests de flujos que involucran WhatsApp (mock Twilio).
    email: tests de envío de correo (usan locmem backend).
