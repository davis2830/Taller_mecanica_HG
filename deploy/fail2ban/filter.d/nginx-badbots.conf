# /etc/fail2ban/filter.d/nginx-badbots.conf
#
# Detecta IPs que escanean URLs típicas de exploits/vulnerabilidades.
# Match contra el access log de Nginx (formato combined).

[Definition]
badbotsmatch = (\.env|\.git|\.aws|\.svn|\.htaccess|\.htpasswd|/wp-admin|/wp-login|/wp-content|/wp-includes|/phpmyadmin|/pma/|/myadmin|/dbadmin|/adminer|/phpinfo|/shell\.php|/eval-stdin\.php|/cgi-bin/luci|/HNAP1|/boaform|/manager/html|/jenkins/|/struts2|/owa/|/autodiscover|/ecp/|/.well-known/openid-configuration|/api/jsonws/|/console/login)

failregex = ^<HOST> .* "(GET|POST|HEAD) [^"]*%(badbotsmatch)s[^"]* HTTP/[\d\.]+" \d+ \d+ ".*" ".*"$

ignoreregex =
