# /etc/fail2ban/filter.d/nginx-limit-req.conf
#
# Detecta IPs que disparan el rate-limit de Nginx repetidamente.
# Match contra el log line típico:
#   2024/01/01 10:00:00 [error] 1234#1234: *56 limiting requests, excess: 5.000 by zone "login", client: 1.2.3.4, ...

[Definition]
failregex = limiting requests, excess: [\d\.]+ by zone "[^"]+", client: <HOST>
ignoreregex =
