# /etc/nginx/conf.d/limits.conf — definiciones de rate limiting y connection
# limiting que viven en el contexto http{} (no dentro de un server{}).
#
# Instalación: sudo cp deploy/nginx/limits.conf /etc/nginx/conf.d/limits.conf
# Después: sudo nginx -t && sudo systemctl reload nginx

# ─────────────────────────────────────────────────────────────────────
# Rate limit zones — usadas en gctorque.conf con `limit_req zone=...`
# ─────────────────────────────────────────────────────────────────────

# Zona "login" — para endpoints de auth (POST /api/v1/*/token/).
#   - 10MB de memoria (~160k IPs únicas)
#   - 5 req/min por IP (sostenido). Burst de 5 sin delay = primeras 5
#     pasan instantáneo, después se aplica el rate.
#   - Ataques de brute-force: 5 intentos/min = ~7000/día por IP.
#     fail2ban lo banea mucho antes (3 fails → 1h ban).
limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;

# Zona "api" — endpoints generales del API (todo /api/ que no sea login).
#   - 30 req/sec sostenido por IP
#   - Burst de 50 = picos cortos OK (cuando un usuario abre una página
#     que dispara muchas requests paralelas).
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;

# ─────────────────────────────────────────────────────────────────────
# Connection limit — protege contra slowloris y conexiones colgadas.
# ─────────────────────────────────────────────────────────────────────

limit_conn_zone $binary_remote_addr zone=perip:10m;

# ─────────────────────────────────────────────────────────────────────
# Logging cuando se aplica throttle — útil para fail2ban y monitoreo.
# ─────────────────────────────────────────────────────────────────────

limit_req_log_level warn;
limit_req_status 429;
limit_conn_log_level warn;
limit_conn_status 429;
