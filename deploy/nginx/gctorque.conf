# Nginx — config de producción para gctorque.com (multi-tenancy + hardening)
#
# Coloca este archivo en /etc/nginx/sites-available/gctorque y enlazalo a
# sites-enabled/. Antes de habilitar SSL, asegurate que /etc/letsencrypt/
# tenga los certs (certbot certonly --dns-...). Después `sudo nginx -t` y
# `sudo systemctl reload nginx`.
#
# Comportamiento:
#   - Redirige todo HTTP → HTTPS.
#   - Sirve el SPA (build de Vite en /srv/taller-mecanico/taller_mecanico/frontend/dist)
#     para CUALQUIER subdomain de gctorque.com (incluyendo *.gctorque.com).
#   - Proxa /api/ /media/ /static/ /admin/ a Gunicorn (Django) PRESERVANDO
#     el Host original — eso es lo que hace que django-tenants pueda saber
#     a qué schema rutear (admin.gctorque.com → public, fixfast.gctorque.com
#     → taller_fixfast, etc.).
#   - Rate limit agresivo en /api/v1/*/token/ (login) — anti brute-force.
#   - Rate limit moderado en /api/ general — anti scraping/abuso.
#
# Custom domains (clientes premium):
#   Cuando un cliente trae su propio dominio, agregá un nuevo `server` block
#   IGUAL al de abajo cambiando solo `server_name` y `ssl_certificate*`.
#   Lo más simple: `sudo certbot --nginx -d tallerjuan.com.ar` y certbot
#   genera el block automáticamente.
#
# Pre-requisito de hardening (en /etc/nginx/nginx.conf):
#   server_tokens off;          # esconde versión de Nginx
#   client_body_timeout 12;
#   client_header_timeout 12;
#   send_timeout 10;

# ============================================================
# Rate limit zones (definidas a nivel http{} — ver deploy/nginx/limits.conf
# que se incluye desde /etc/nginx/conf.d/)
# ============================================================
# Estas zonas se DEFINEN en deploy/nginx/limits.conf que va en /etc/nginx/conf.d/.
# Acá solo las CONSUMIMOS con `limit_req zone=...`.

# ============================================================
# HTTP → HTTPS redirect (incluyendo wildcard)
# ============================================================
server {
    listen 80;
    listen [::]:80;
    server_name gctorque.com *.gctorque.com;

    # ACME challenge para Let's Encrypt — debe responderse en HTTP
    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ============================================================
# HTTPS — gctorque.com y todos sus subdominios
# ============================================================
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name gctorque.com *.gctorque.com;

    # SSL — wildcard cert emitido vía DNS-01 challenge
    ssl_certificate     /etc/letsencrypt/live/gctorque.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/gctorque.com/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_session_tickets off;
    ssl_protocols TLSv1.2 TLSv1.3;
    # Cipher suite Mozilla intermediate (compat amplia, sin TLS 1.0/1.1).
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384:DHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    # Diffie-Hellman params 2048bit (ver SECURITY.md paso para generarlo).
    ssl_dhparam /etc/nginx/ssl/dhparam.pem;
    # OCSP stapling — verificación SSL más rápida y privacy.
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 1.1.1.1 valid=300s;
    resolver_timeout 5s;

    # ============================================================
    # Security headers (always = aplican incluso a respuestas de error)
    # ============================================================
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # Permissions-Policy — desactiva APIs sensibles por default.
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=(), usb=()" always;
    # Content-Security-Policy — empezamos en modo "Report-Only" para no romper
    # la app por cualquier inline script. Cuando esté validada, cambiar a CSP.
    # NOTA: el SPA de Vite necesita 'unsafe-inline' para algunos chunks; ajustar
    # según los reports antes de migrar a enforce.
    add_header Content-Security-Policy-Report-Only "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https://*.gctorque.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;

    # Tamaño máximo de request body (uploads de PDFs de OT, fotos, etc.)
    client_max_body_size 25M;
    # Anti slow-request DoS.
    client_body_timeout 12s;
    client_header_timeout 12s;
    send_timeout 10s;

    # Limit de conexiones concurrentes por IP (anti slowloris básico).
    limit_conn perip 50;

    # Logs (separar por dominio si querés más granularidad)
    access_log /var/log/nginx/gctorque-access.log;
    error_log  /var/log/nginx/gctorque-error.log warn;

    # ============================================================
    # Endpoints de auth (login, refresh) — rate limit agresivo
    # ============================================================
    # 5 req/min sostenido + burst 5 = primer batch rápido permitido,
    # después cae al sostenido. Brute-force con 1000 intentos seguidos
    # toma >3 horas y dispara fail2ban antes.
    location ~ ^/api/v1/(public-admin/)?token/ {
        limit_req zone=login burst=5 nodelay;
        limit_req_status 429;
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_redirect off;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    # ============================================================
    # Backend Django general — /api/, /admin/, /static/, /media/
    # ============================================================
    # IMPORTANTE: proxy_set_header Host $host preserva el dominio original
    # para que django-tenants pueda determinar el schema correcto.

    location /api/ {
        # Rate limit moderado — 30 req/sec sostenido + burst 50.
        limit_req zone=api burst=50 nodelay;
        limit_req_status 429;
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_redirect off;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    location /admin/ {
        # Restringe el admin de Django a IPs internas si es posible.
        # Comentado por default; descomentar y ajustar si querés blanca.
        # allow 200.x.x.x;       # tu IP fija
        # deny all;
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }

    # /static/ servidos por Nginx directo (no pasan por Django).
    location /static/ {
        alias /srv/taller-mecanico/taller_mecanico/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # /media/ — uploads de los talleres (fotos OT, firmas digitales, etc.)
    location /media/ {
        alias /srv/taller-mecanico/taller_mecanico/media/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # Bloquear acceso a archivos sensibles que podrían colarse al dist/
    location ~ /\.(?!well-known) {
        deny all;
        access_log off;
        log_not_found off;
    }
    location ~ \.(env|sqlite3|db|log|config|ini|yml|yaml)$ {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ============================================================
    # SPA — todo lo demás cae al index.html del React build
    # ============================================================
    location / {
        root /srv/taller-mecanico/taller_mecanico/frontend/dist;
        try_files $uri $uri/ /index.html;

        # Cache agresivo para los assets versionados (Vite agrega hash).
        # NO cachear el index.html (es el entry point que carga los assets).
        location ~* \.(js|css|woff2?|ttf|svg|png|jpg|jpeg|gif|ico)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            try_files $uri =404;
        }
    }
}
