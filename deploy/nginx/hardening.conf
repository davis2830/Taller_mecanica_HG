# /etc/nginx/conf.d/hardening.conf — directivas globales de hardening.
#
# Instalación: sudo cp deploy/nginx/hardening.conf /etc/nginx/conf.d/hardening.conf
# Después: sudo nginx -t && sudo systemctl reload nginx

# Ocultar versión de Nginx en respuestas Server: y páginas de error.
server_tokens off;

# Bloquear métodos HTTP no usados (DELETE/PUT/PATCH siguen pasando, pero
# TRACE/OPTIONS/etc. quedan disponibles para CORS preflight, ojo).
# NO descomentar a la ligera — DRF necesita OPTIONS para CORS preflight.
# if ($request_method !~ ^(GET|HEAD|POST|PUT|PATCH|DELETE|OPTIONS)$) {
#     return 405;
# }

# Header del servidor más genérico (hide_header funciona con módulo más_misc;
# server_tokens off ya alcanza para no exponer versión exacta).

# Buffer overflow protection.
client_body_buffer_size 16k;
client_header_buffer_size 1k;
large_client_header_buffers 4 8k;

# Desactivar logging para rutas ruidosas — opcional.
map $request_uri $loggable {
    default 1;
    ~^/static/  0;
    ~^/media/   0;
}
