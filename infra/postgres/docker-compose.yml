# Postgres local para desarrollo.
# Uso:
#   cd infra/postgres && docker compose up -d        # arranca en background
#   cd infra/postgres && docker compose down         # apaga
#   cd infra/postgres && docker compose down -v      # apaga + borra data
#
# Una vez arriba, Django se conecta con los defaults de `taller_mecanico/taller_mecanico/settings.py`:
#   DB_HOST=localhost  DB_PORT=5432  DB_USER=taller_meca  DB_PASSWORD=taller_meca_dev
#
# Para PR #41b (django-tenants) usamos el MISMO Postgres — los tenants viven
# en schemas (`public`, `taller_demo`, etc.) dentro de la DB `taller_mecanico`.

services:
  postgres:
    image: postgres:16-alpine
    container_name: taller_mecanico_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: taller_mecanico
      POSTGRES_USER: taller_meca
      POSTGRES_PASSWORD: taller_meca_dev
      # Configuración útil para debugging: log de statements >100ms.
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --locale=C"
    ports:
      # Exponemos 5432 → 5432 al host, así Django corre nativo en el host
      # y se conecta a `localhost:5432`. Si alguien en tu team usa otro Postgres
      # en 5432, cambiá el host-side a 5433 y ajustá `DB_PORT` en el .env.
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taller_meca -d taller_mecanico"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
    driver: local
